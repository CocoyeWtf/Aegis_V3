# Loki — agregation de logs CHAOS Platform (STIME B4)
# Retention 180 jours (exigence >= 6 mois), stockage filesystem local.
auth_enabled: false

server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # 4320 h = 180 jours / 180 days (>= 6 mois exiges par le questionnaire)
  retention_period: 4320h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
