# Promtail — collecte des logs de tous les conteneurs Docker vers Loki (STIME B4)
server:
  http_listen_port: 9080

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      # /chaos-route-app-1 -> container=chaos-route-app-1
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
