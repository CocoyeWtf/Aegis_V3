services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cmro
      POSTGRES_USER: cmro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmro -d cmro"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # init: un reaper (tini) recolte les zombies ssl_client engendres par le
    # healthcheck wget/TLS ; sans lui, Caddy (PID 1) ne les reape pas et ils
    # s'accumulent jusqu'a epuiser RLIMIT_NPROC (fork: Resource temporarily unavailable).
    init: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      # On cible le vhost IP avec le bon Host : Caddy repond 200 via l'app, sans
      # redirection HTTPS (donc sans handshake TLS ni ssl_client a reaper).
      # Un simple http://localhost redirige vers :443 et echoue (pas de cert localhost).
      test: ["CMD", "wget", "-q", "--spider", "--header=Host: 76.13.58.182", "http://localhost:80/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  app:
    build: .
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      - ./apk:/app/apk
      - ./pdv-plans:/app/pdv-plans
    env_file: .env.production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  caddy_data:
  caddy_config:
  pgdata:
