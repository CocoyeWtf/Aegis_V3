name: Tenant isolation (adversarial)

# Rejoue la matrice de tests ADVERSES d'isolation multi-tenant à chaque push /
# PR touchant le backend. Toute régression d'étanchéité (un tenant atteint les
# données d'un autre) fait échouer la CI. Tests auto-suffisants (SQLite, aucune
# dépendance externe).

on:
  push:
    paths:
      - 'Chaos_Route/backend/**'
      - '.github/workflows/tenant-isolation.yml'
  pull_request:
    paths:
      - 'Chaos_Route/backend/**'

jobs:
  isolation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Chaos_Route/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.13'
      - name: Install backend deps
        run: pip install -r requirements.txt
      - name: Run adversarial tenant-isolation matrix
        run: |
          python -m pytest -q \
            tests/test_tenant_isolation_adversarial.py \
            tests/test_tenant_isolation.py \
            tests/test_reference_data_isolation.py
